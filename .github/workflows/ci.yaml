name: Linter & Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint & Run Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [24, 26]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: npm ci

      - name: Build Package
        run: npm run build

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests
        run: npm test

  lint-test-required:
    name: Lint & Run Tests
    needs: lint-test
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify the matrix passed
        run: |
          if [ "${{ needs.lint-test.result }}" != "success" ]; then
            echo "One or more Lint & Run Tests matrix jobs failed (result: ${{ needs.lint-test.result }})."
            exit 1
          fi
